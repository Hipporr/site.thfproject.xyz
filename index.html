<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Custom Server Layout</title>
<style>
  :root {
    --bg-color: #111111;
    --card-bg: #222222;
    --blue-accent: #00bfff; /* Change this to your server's main theme color */
    --radius-lg: 16px;
    --radius-sm: 8px;
    --text-main: #ffffff;
    --text-muted: #aaaaaa;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 900px;
    width: 100%;
  }

  /* Base link styling */
  a.card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    border-radius: var(--radius-lg);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    overflow: hidden;
  }

  a.card-link:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  /* --- Top Left Column (Logo + Copy IP) --- */
  .col-logo {
    grid-column: span 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .logo-card {
    background-color: var(--blue-accent);
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: var(--radius-lg);
  }

  .logo-card img {
    width: 60%;
    height: auto;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  }

  .copy-ip-btn {
    background-color: var(--card-bg);
    color: var(--text-main);
    padding: 12px;
    border-radius: var(--radius-sm);
    text-align: center;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .copy-ip-btn:hover {
    background-color: #333333;
  }

  .copy-icon {
    width: 16px;
    height: 16px;
    background-color: currentColor;
    mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>') no-repeat center / contain;
    -webkit-mask: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>') no-repeat center / contain;
  }

  /* --- Top Middle (Store) --- */
  .store-card {
    grid-column: span 2;
    /* Add your URL back here: url('YOUR_IMAGE_LINK') */
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 40%), #333333; 
    position: relative;
    min-height: 200px;
  }

  .card-title {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 1.5rem;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  }

  /* --- Top Right (Discord) --- */
  .discord-card {
    grid-column: span 1;
    background-color: var(--card-bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  .discord-logo {
    width: 60px;
    margin-bottom: 12px;
    fill: #5865F2; 
  }

  .discord-count {
    font-size: 1.2rem;
    font-weight: 800;
  }

  .discord-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .green-dot {
    width: 6px;
    height: 6px;
    background-color: #23a559;
    border-radius: 50%;
  }

  /* --- Bottom Left (Stats) --- */
  .stats-card {
    grid-column: span 2;
    /* Add your URL back here: url('YOUR_IMAGE_LINK') */
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 50%), #333333;
    position: relative;
    min-height: 180px;
  }

  /* --- Bottom Right (How To Join) --- */
  .join-card {
    grid-column: span 2;
    /* Add your URL back here: url('YOUR_IMAGE_LINK') */
    background: linear-gradient(rgba(30, 30, 30, 0.8), rgba(30, 30, 30, 0.8)), #2a2a2a;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .join-card h2 {
    font-size: 1.2rem;
    margin-bottom: 16px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }

  .mc-input-group {
    margin-bottom: 12px;
  }

  .mc-input-group label {
    display: block;
    font-size: 0.8rem;
    color: #ccc;
    margin-bottom: 4px;
    text-shadow: 1px 1px 1px black;
    font-family: monospace; 
  }

  .mc-input {
    background-color: #000;
    border: 2px solid #555;
    border-top-color: #333;
    border-left-color: #333;
    border-bottom-color: #888;
    border-right-color: #888;
    color: white;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 0.9rem;
    width: 100%;
  }

  /* Responsive Design */
  @media (max-width: 768px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
    }
    .col-logo, .store-card, .discord-card, .stats-card, .join-card {
      grid-column: span 1;
    }
    .logo-card {
      min-height: 150px;
    }
  }
</style>
</head>
<body>

<div class="dashboard-grid">
  
  <div class="col-logo">
    <a href="YOUR_LINK_HERE" class="card-link logo-card">
      </a>
    <div class="copy-ip-btn">
      <div class="copy-icon"></div>
      YOUR.IP.HERE
    </div>
  </div>

  <a href="YOUR_LINK_HERE" class="card-link store-card">
    <div class="card-title">Store</div>
  </a>

  <a href="YOUR_LINK_HERE" class="card-link discord-card">
    <svg class="discord-logo" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path d="M107.7 8.07A105.15 105.15 0 0081.47 0a72.06 72.06 0 00-3.36 6.83 97.68 97.68 0 00-29.08 0A72.37 72.37 0 0045.67 0a105.14 105.14 0 00-26.23 8.07C2.04 33.84-2.4 58.7.9 83.33a105.73 105.73 0 0032.22 16.15 77.7 77.7 0 006.89-11.1 82.25 82.25 0 01-10.87-5.18c.84-.6 1.66-1.24 2.45-1.9 21.06 9.68 43.83 9.68 64.7 0 .79.66 1.6 1.3 2.45 1.9a81.9 81.9 0 01-10.87 5.18 77.34 77.34 0 006.89 11.1 105.25 105.25 0 0032.22-16.15c3.84-29.06-3.64-51.52-19.29-75.26zM42.44 65.17c-5.8 0-10.6-5.32-10.6-11.83 0-6.52 4.7-11.84 10.6-11.84 5.95 0 10.74 5.4 10.6 11.84 0 6.5-4.65 11.83-10.6 11.83zm42.26 0c-5.8 0-10.6-5.32-10.6-11.83 0-6.52 4.7-11.84 10.6-11.84 5.95 0 10.74 5.4 10.6 11.84 0 6.5-4.65 11.83-10.6 11.83z"/>
    </svg>
    <div class="discord-count">0+</div>
    <div class="discord-sub"><span class="green-dot"></span> Discord Members</div>
  </a>

  <a href="YOUR_LINK_HERE" class="card-link stats-card">
    <div class="card-title">Stats</div>
  </a>

  <a href="YOUR_LINK_HERE" class="card-link join-card">
    <h2>How To Join</h2>
    <div class="mc-input-group">
      <label>Server Name</label>
      <div class="mc-input">Your Server Name_</div>
    </div>
    <div class="mc-input-group">
      <label>Server Address</label>
      <div class="mc-input"></div>
    </div>
  </a>

</div>

</body>
</html>
